{% extends "base.html" %}

{% block title %}订单管理{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-receipt me-2"></i>订单管理</h2>
    <a href="/orders/new" class="btn btn-primary"><i class="bi bi-plus-circle me-1"></i>新建订单</a>
</div>

<!-- 筛选栏 -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label">状态筛选</label>
                <select class="form-select" id="statusFilter">
                    <option value="">全部</option>
                    <option value="draft">草稿</option>
                    <option value="nested">已排版</option>
                    <option value="confirmed">已确认</option>
                </select>
            </div>
            <div class="col-md-6 d-flex align-items-end">
                <button class="btn btn-outline-primary" onclick="loadOrders()"><i class="bi bi-search me-1"></i>筛选</button>
            </div>
        </div>
    </div>
</div>

<!-- 订单列表 -->
<div class="card">
    <div class="card-header bg-white">
        <span><i class="bi bi-list-ul me-2"></i>订单列表</span>
        <span class="badge bg-secondary" id="orderCount">0</span>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover" id="orderTable">
                <thead>
                    <tr>
                        <th>订单编号</th>
                        <th>客户</th>
                        <th>零件数</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    <tr><td colspan="6" class="text-center text-muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
function getStatusBadge(status) {
    const map = {
        'draft': 'bg-secondary',
        'nested': 'bg-primary',
        'confirmed': 'bg-success'
    };
    const labels = {
        'draft': '草稿',
        'nested': '已排版',
        'confirmed': '已确认'
    };
    return `<span class="badge ${map[status] || 'bg-secondary'}">${labels[status] || status}</span>`;
}

function loadOrders() {
    const status = document.getElementById('statusFilter').value;
    const url = status ? `/api/orders?status=${status}` : '/api/orders';
    fetch(url)
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('orderTableBody');
            document.getElementById('orderCount').textContent = data.length;
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">暂无订单</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(order => `
                <tr>
                    <td><strong>${order.order_no}</strong></td>
                    <td>${order.customer_name || '-'}</td>
                    <td>${order.item_count || 0}</td>
                    <td>${getStatusBadge(order.status)}</td>
                    <td>${order.created_at}</td>
                    <td>
                        <a href="/orders/${order.id}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i></a>
                        <a href="/orders/${order.id}/edit" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteOrder(${order.id})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        })
        .catch(err => console.error(err));
}

function deleteOrder(id) {
    if (!confirm('确定要删除此订单吗？')) return;
    fetch(`/api/orders/${id}`, { method: 'DELETE' })
        .then(res => res.json())
        .then(() => loadOrders())
        .catch(err => alert('删除失败: ' + err.message));
}

document.addEventListener('DOMContentLoaded', loadOrders);
</script>
{% endblock %}
